name: church_media_app
description: Grace Church — Media App for capturing, uploading, and viewing church media.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.1.0

  # HTTP & Networking
  dio: ^5.4.0
  http: ^1.2.0

  # Secure Storage
  flutter_secure_storage: ^10.0.0

  # Media Capture
  camera: ^0.12.0+1
  image_picker: ^1.0.7
  record: ^6.2.0           # Audio recording
  audio_waveforms: ^2.0.2  # Waveform visualization

  # Media Playback
  video_player: ^2.8.2
  chewie: ^1.7.4            # Video player UI
  just_audio: ^0.10.5       # Audio playback
  cached_network_image: ^3.3.1

  # File & Storage
  path_provider: ^2.1.2
  path: ^1.9.0
  permission_handler: ^12.0.1
  workmanager: ^0.9.0+3        # Background tasks
  connectivity_plus: ^7.0.0

  # UI & Animations
  animations: ^2.0.11
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  flutter_staggered_animations: ^1.1.1
  smooth_page_indicator: ^2.0.1
  percent_indicator: ^4.2.3
  fl_chart: ^1.2.0

  # Forms & Validation
  reactive_forms: ^18.2.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.3.3
  share_plus: ^12.0.1
  url_launcher: ^6.2.5
  image: ^4.1.7
  flutter_image_compress: ^2.1.0

  # Icons
  flutter_svg: ^2.0.10+1
  iconsax: ^0.0.8

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Cinzel
      fonts:
        - asset: assets/fonts/Cinzel-Regular.ttf
        - asset: assets/fonts/Cinzel-Bold.ttf
          weight: 700
    - family: Lato
      fonts:
        - asset: assets/fonts/Lato-Regular.ttf
        - asset: assets/fonts/Lato-Light.ttf
          weight: 300
        - asset: assets/fonts/Lato-Bold.ttf
          weight: 700
